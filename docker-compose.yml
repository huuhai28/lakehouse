
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ── MySQL ─────────────────────────────────────────────────
  mysql:
    image: debezium/example-mysql:2.4
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_USER: mysqluser
      MYSQL_PASSWORD: mysqlpw
  # ── PostgreSQL (bật logical replication cho Debezium) ─────
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    command: postgres -c wal_level=logical -c max_replication_slots=4 -c max_wal_senders=4
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: congty

  # ── MongoDB (chạy Replica Set cho Debezium) ───────────────
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    command: mongod --replSet rs0 --bind_ip_all

  mongo-init:
    image: mongo:6
    container_name: mongo-init
    depends_on:
      - mongo
    restart: "no"
    entrypoint: >
      bash -c "
        sleep 5 &&
        mongosh --host mongo --eval
        'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo:27017\"}]})'
      "

  connect:
    image: debezium/connect:2.4
    container_name: debezium
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - mysql
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    ports:
      - "8089:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
  flink-jobmanager:
    image: flink:1.18
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    volumes:
      - .:/opt/flink/lib/custom_libs  # Mount thư mục hiện tại vào container
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
  flink-taskmanager:
    image: flink:1.18
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    volumes:
      - .:/opt/flink/lib/custom_libs
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=50
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 25
        taskmanager.memory.process.size: 4096m

  flink-sql-client:
    image: flink:1.18
    container_name: flink-sql-client
    depends_on:
      - flink-jobmanager
    command: bin/sql-client.sh
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
    volumes:
      - .:/opt/flink/lib/custom_libs
    tty: true
  polaris:
    image: apache/polaris:latest  # Hoặc dùng version cụ thể như apache/polaris:0.1.0
    container_name: polaris
    ports:
      - "8181:8181"
      - "8182:8182"
    environment:
      - AWS_REGION=us-east-1          # THÊM DÒNG NÀY
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=admin          # THÊM DÒNG NÀY
      - AWS_SECRET_ACCESS_KEY=password  # THÊM DÒNG NÀY
      - AWS_ENDPOINT_URL=http://minio:9000
      - POLARIS_STORAGE_CONFIGURATION_S3_PATH_STYLE_ACCESS=true
      - JAVA_TOOL_OPTIONS=-Daws.endpointOverride=http://minio:9000 -Daws.accessKeyId=admin -Daws.secretAccessKey=password
    volumes:
      - polaris_data:/var/lib/polaris
# Lưu ý: Một số bản của Apache có thể thay đổi đường dẫn file config
    # Nếu báo lỗi không tìm thấy file, hãy thử bỏ dòng command dưới đây để dùng mặc định
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
  trino:
    image: trinodb/trino:406
    container_name: trino
    ports:
      - "8080:8080"
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://minio:9000
    volumes:
      - ./trino-conf/iceberg.properties:/etc/trino/catalog/iceberg.properties
      - ./trino-conf/minio.properties:/etc/trino/catalog/minio.properties

  superset-db:
    image: postgres:15
    container_name: superset-db
    environment:
      - POSTGRES_USER=superset
      - POSTGRES_PASSWORD=superset
      - POSTGRES_DB=superset
      - POSTGRES_HOST_AUTH_METHOD=trust
  superset-redis:
    image: redis:7
    container_name: superset-redis

  superset:
    image: apache/superset:3.1.3
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=supersecretkey123456
    depends_on:
      - superset-db
      - superset-redis
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "
 # OpenMetadata cần Elasticsearch để tìm kiếm
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - network.host=0.0.0.0
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    healthcheck:  # ← THÊM phần này
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  openmetadata-db:
    image: postgres:15
    container_name: openmetadata-db
    environment:
      - POSTGRES_USER=om_user
      - POSTGRES_PASSWORD=om_password
      - POSTGRES_DB=openmetadata_db
      - POSTGRES_HOST_AUTH_METHOD=trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U om_user -d openmetadata_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Server chính của OpenMetadata
  openmetadata-server:
    image: openmetadata/server:1.4.2
    container_name: openmetadata-server
    ports:
      - "8585:8585"
    environment:
      - DB_DRIVER_CLASS=org.postgresql.Driver
      - DB_SCHEME=postgresql
      - DB_USER=om_user
      - DB_PASSWORD=om_password
      - DB_HOST=openmetadata-db
      - DB_PORT=5432
      - DB_NAME=openmetadata_db
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_SCHEME=http
      - PIPELINE_SERVICE_CLIENT_ENDPOINT=http://openmetadata-ingestion:8080
      - PIPELINE_SERVICE_CLIENT_TYPE=airflow
      - PIPELINE_SERVICE_CLIENT_AUTH_CONFIG_TYPE=basic
      - PIPELINE_SERVICE_CLIENT_AUTH_CONFIG_USERNAME=admin
      - PIPELINE_SERVICE_CLIENT_AUTH_CONFIG_PASSWORD=admin
      - SERVER_HOST_API_URL=http://openmetadata-server:8585/api
      - MIGRATION_LIMIT_PARAM=1300  # ← THÊM dòng này nếu chưa có
      - _PIP_ADDITIONAL_REQUIREMENTS=openmetadata-managed-apis==1.4.2  # THÊM DÒNG NÀY
    depends_on:
      openmetadata-db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  ingestion:
    image: openmetadata/ingestion:1.4.2
    container_name: openmetadata-ingestion
    command: standalone
    ports:
      - "8070:8080"
    environment:
      - AIRFLOW_ADMIN_USER=admin
      - AIRFLOW_ADMIN_PASSWORD=admin
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AUTH_PROVIDER=no-auth
      - OPENMETADATA_SERVER_URL=http://openmetadata-server:8585/api
      - AIRFLOW__WEBSERVER__SECRET_KEY=openmetadata_secret_key
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - _PIP_ADDITIONAL_REQUIREMENTS=openmetadata-managed-apis==1.4.2
    depends_on:
      - openmetadata-server

  polaris-proxy:
    image: nginx:alpine
    container_name: polaris-proxy
    depends_on:
      - polaris
    volumes:
      - ./nginx-conf/polaris-proxy.conf:/etc/nginx/conf.d/default.conf


volumes:
  polaris_data: